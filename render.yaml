# Render.com blueprint — deploy the API, a Postgres DB, and a daily price job.
# Push this repo to GitHub, then "New > Blueprint" in Render and point it here.
services:
  - type: web
    name: holdcapital-api
    runtime: docker
    plan: starter
    healthCheckPath: /healthz
    envVars:
      - key: DATABASE_URL
        fromDatabase: { name: holdcapital-db, property: connectionString }
      - key: JWT_SECRET
        generateValue: true
      - key: PUBLIC_URL
        sync: false            # set to your Render URL after first deploy
      - key: EODHD_API_KEY
        sync: false            # add your EODHD key for live prices
      - key: STRIPE_SECRET_KEY
        sync: false            # add to enable real billing
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRICE_PLUS
        sync: false
      - key: STRIPE_PRICE_PRO
        sync: false

  - type: cron
    name: holdcapital-prices
    runtime: docker
    schedule: "0 7 * * *"      # daily 07:00 UTC
    dockerCommand: python -m jobs.refresh_prices
    envVars:
      - key: DATABASE_URL
        fromDatabase: { name: holdcapital-db, property: connectionString }
      - key: EODHD_API_KEY
        sync: false

databases:
  - name: holdcapital-db
    plan: free
